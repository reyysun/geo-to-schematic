<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>GeoToSchematic</title>
  <link rel="icon" href="images/icon.png" type="image/x-icon">
  <script src="lang.js"></script>
  <script type="module" src="main.js" defer></script>

  <style>
    body {
      background-color: #2c2c2c;
      margin-left: 20px;
      margin-top: 25px;
      color: #f5f5f5;
      font-family: sans-serif;
      position: relative;
      z-index: 0;
    }

    /* фоновое изображение через псевдоэлемент */
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      opacity: 0;
      transition: opacity 2s ease-in-out;
      z-index: -1;
    }

    body::before {
      background-image: url('images/sitebg.webp');
    }

    body::after {
      background-image: url('images/sitebg2.webp');
    }

    body.bg-loaded::before {
      opacity: 1; /* проявление только фона */
    }

    body.bg-alt::before {
      opacity: 0;
    }
    body.bg-alt::after {
      opacity: 1;
    }

    .title {
      display: inline-block;
      vertical-align: middle;
      margin-left: 10px;
      font-size: 28px;
      font-weight: bold;
      color: lightcyan;
      text-shadow: 0 0 5px #002548, 0 0 10px #002548, 0 0 15px #002548;
    }
    .logo {
      vertical-align: middle;
      display: inline-block;
      height: 100%;
      max-width: 100px;
    }
    .nicebox {
      background-color: #2a2a2a;
      color: #f0f0f0;
      border: 1px solid #555;
      padding: 6px;
      border-radius: 4px;
      margin-top: 5px;
      display: inline-block;
      font-family: inherit;
    }
    .nicebox:disabled {
      color: #8f8f8f;
    }
    .nicetext {
      color: lightcyan;
      text-decoration: underline;
    }
    .nicebutton {
      background-color: #525252;
      color: #f0f0f0;
      border: 1px solid #888888;
      padding: 6px;
      border-radius: 4px;
      margin-top: 5px;
      display: inline-block;
      font-family: inherit;
    }
    .langswitcher {
      position: fixed;
      display: flex;
      bottom: 1%;
      right: 1%;
    }
    .langbutton {
      width: 30px;
      height: 30px;
    }
    .chatcommand {
      color: #ff5500
    }
    .nicehr {
      border: 1px solid #555;
    }

    a:link, a:visited {
      color: mediumturquoise;
      text-decoration: underline;
    }

    .tooltip {
      position: relative;
      display: inline-block;
      cursor: help;
    }

    .setting-title {
      font-size: 18px;
      font-weight: bold;
      margin-top: 5px;
      margin-bottom: 5px;
      display: inline;
    }

    .tooltip-text {
      visibility: hidden;
      background-color: #444;
      color: #fff;
      text-align: left;
      line-height: 1.3;
      border-radius: 6px;
      padding: 8px 10px;
      position: absolute;
      z-index: 1;
      top: 50%;
      left: 110%;
      transform: translateY(-50%);
      opacity: 0;
      transition: opacity 0.2s;

      width: max-content;        /* Автоширина по содержимому */
      max-width: 620px;          /* Ограничение по максимуму (по желанию) */
      white-space: normal;       /* Разрешить перенос строк */
      box-sizing: border-box;    /* Учитывать padding в расчётах ширины */
    }

    .tooltip:hover .tooltip-text {
      visibility: visible;
      opacity: 1;
    }

    button {
      cursor: pointer;
      width: 100%;
    }
    
  </style>
</head>

<body>

  <header>
    <div>
      <img src="images/btestylelogo.png" alt="Pixelated stylized planet Earth with a contour map above it" class="logo"/>
      <h1 class="title">GeoToSchematic</h1>
    </div>

    <p data-i18n="description" style="margin-top: 25px; margin-bottom: 10px; line-height: 1.5;"></p>
    <p data-i18n="description2" style="font-size: 14px; margin-bottom: 35px;"></p>
  </header>

  <main>
    <!--Import-->
    <section aria-label="Import section" style="width: 40%; display: flex;">
      <input id="fileInput" class="nicebox" style="width: 260px;" type="file" accept=".kml,.geojson,.json" multiple/>
      <span style="width: 10px;"></span>
      <button id="export-button" class="nicebutton" style="width: 170px;" data-i18n="button_export"></button>
    </section>

    <!--Status-->
    <section aria-label="Current status">
      <p id="status" data-i18n="status_import" style="margin-top: 20px; margin-bottom: 10px; text-align: left; font-weight: bold;">
      </p>
    </section>

    <section aria-label="Converted files list">
      <ul id="downloads"></ul>
    </section>

    <section aria-label="Conversion settings" style="margin-top: 10px; display: flex;"> 
      <div aria-labelledby="basesettings" class="nicebox" style="margin-bottom: auto;">

        <!--Base settings-->
        <h2 class="setting-title" id="basesettings" data-i18n="basesettings"></h2>
        
        <hr class="nicehr">

        <!--Contour block ID-->
        <div style="margin-bottom: 10px; margin-top: 5px;">
          <label for="blockId-input" data-i18n="blockid"></label>
          <input id="blockId-input" type="text" class="nicebox" value="diamond_block" style="width: 110px;"/>
        </div>

        <!--Offset-->
        <hr class="nicehr">
        <div>
          <h3 class="setting-title" data-i18n="offset"></h3>
          <span class="tooltip" role="tooltip">❔
            <span class="tooltip-text" data-i18n="offset_tooltip">
            </span>
          </span>
        </div>
          
        <div aria-label="Offset coordinates" style="margin: 10px 5px 0 10px;"> 
          <!--X Offset-->
          <div>
            <label for="doXOffset-input">X:</label>
            <input id="doXOffset-input" type="text" class="nicebox" value="0" style="width: 70px;"/>
          </div>

          <!--Y Offset-->
          <div>
            <label for="doYOffset-input">Y:</label>
            <input id="doYOffset-input" type="text" class="nicebox" value="0" style="width: 70px;"/>
          </div>

          <!--Z Offset-->
          <div>
            <label for="doZOffset-input">Z:</label>
            <input id="doZOffset-input" type="text" class="nicebox" value="0" style="width: 70px;"/>
          </div>
        </div>

        <!--Offset presets-->
        <div style="margin-top:20px; margin-left: 5px;">
          <label for="bteOffset-select" data-i18n="offset_preset" style="margin-bottom: 10px;"></label><br>
          <select id="bteOffset-select" class="nicebox">
            <option value="offsetNone">Default</option>
            <option value="offsetAsean">BTE ASEAN</option>
            <option value="offsetItaly">BTE Italia</option>
            <option value="offsetBalkans">BTE Balkans</option>
            <option value="offsetRomania">BTE România + Moldova</option>
          </select>
        </div>

        <hr class="nicehr">

        <!--Output format-->
        <h3 class="setting-title" id="outputformat" data-i18n="outputformat"></h3>
        
        <div style="margin-bottom: 10px; margin-top: 5px; margin-left: 5px;">
          <select aria-labelledby="outputformat" class="nicebox" id="schematicver-select">
            <option value="SpongeV3">Sponge schematic (1.13+)</option>
            <option value="Legacy">Legacy schematic (1.12.2)</option>
          </select>
        </div>

      </div>

      <!--Terrain settings-->
      <div aria-labelledby="terrainsettings" style="display: grid; vertical-align: top; margin-left: 10px; margin-bottom: auto;">
        <div class="nicebox" style="margin-bottom: auto; vertical-align: top;">
          <h2 class="setting-title" id="terrainsettings" data-i18n="terrainsettings"></h2>

          <hr class="nicehr">

          <!--Consider elevation-->
          <div style="margin-top: 15px; margin-bottom: 15px;">
            <input type="checkbox" id="consElev-check" checked="true">
            <label for="consElev-check" data-i18n="conselevation"></label>
            <span class="tooltip" role="tooltip">❔
              <span class="tooltip-text" data-i18n="conselevation_tooltip">
              </span>
            </span>
          </div>

          <hr class="nicehr">

          <!--Fill terrain-->
          <div style="margin-top: 10px; margin-bottom: 10px;">
            <input data-i18n="fillterrain" type="checkbox" id="doFill-check"/>
            <label for="doFill-check" data-i18n="fillterrain"></label> 
            <span class="tooltip" role="tooltip">❔
              <span class="tooltip-text" data-i18n="fillterrain_tooltip"></span>
            </span>
          </div>

          <!--Fill block ID-->
          <div>
            <label for="fillBlockId-input" data-i18n="fillingblockid"></label>
            <input id="fillBlockId-input" type="text" class="nicebox" value="emerald_block" style="width: 110px" disabled/>
          </div>

          <hr class="nicehr">

          <!--Make foundation-->
          <div style="margin-top: 10px; margin-bottom: 10px;">
            <input id="make-foundation" type="checkbox" class="nicebox"/>
            <label for="make-foundation" data-i18n="makefoundation"></label>
            <span class="tooltip" role="tooltip">❔
              <span class="tooltip-text" data-i18n="makefoundation_tooltip">
              </span>
            </span>
          </div>

          <!--Foundation block ID-->
          <div style="margin-top: 10px; margin-bottom: 10px;">
            <label for="foundationBlockId-input" data-i18n="foundationblockid"></label>
            <input id="foundationBlockId-input" type="text" class="nicebox" value="stone" style="width: 85px" disabled/>
          </div>

          <!--Foundation thickness-->
          <div style="margin-top: 10px; margin-bottom: 10px;">
            <label for="foundationThickness-input" data-i18n="foundationthickness"></label>
            <input id="foundationThickness-input" type="number" class="nicebox" value="3" min="1" max="10" style="width: 30px;" disabled/>
          </div>

        </div>

      </div>
      
    </section>
  </main>

  <footer>
    <!--Privacy notice-->
    <p data-i18n="privacynotice" style="margin-top: 20px; font-size: 14px"></p>
    <a href="https://github.com/reyysun/geo-to-schematic">Source code</a>
    
    <!--Switch language-->
    <section aria-label="Language switch" id="lang-switcher" class="langswitcher">
      <button id="lang-ru" class="nicebutton langbutton">RU</button>
      <button id="lang-en" class="nicebutton langbutton">EN</button>
    </section>
  </footer>
  
</body>
</html>
